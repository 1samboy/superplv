                    <button class="bet-btn" data-bet="500">MAX</button>

            <button class="spin-btn" id="spinButton">⚡ SPIN ⚡</button>

    <script>
        (function() {
            // Audio
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx;

            function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended')
                audioCtx.resume(); }

            function playTone(f, d, t = 'sine', v = 0.12) {
                if (!audioCtx) return;
                try {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = t;
                    o.frequency.setValueAtTime(f, audioCtx.currentTime);
                    g.gain.setValueAtTime(v, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.start();
                    o.stop(audioCtx.currentTime + d);
                } catch (e) {}
            }

            function soundSpin() { playTone(100 + Math.random() * 200, 0.03, 'square', 0.05); }

            function soundStop() { playTone(300, 0.06, 'square', 0.08); }

            function soundWin() { playTone(523, 0.12);
                setTimeout(() => playTone(659, 0.12), 120);
                setTimeout(() => playTone(784, 0.2), 240); }

            function soundBigWin() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'sine',
                    0.2), i * 100)); }

            function soundMega() { [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => setTimeout(() => playTone(f,
                    0.3, 'sine', 0.25), i * 70)); }

            function soundBonus() { playTone(440, 0.1, 'triangle', 0.2);
                setTimeout(() => playTone(554, 0.1, 'triangle', 0.2), 100);
                setTimeout(() => playTone(659, 0.2, 'triangle', 0.25), 200); }

            // Game
            const SYMBOLS = ['🍒', '🍋', '🍊', '💎', '👑', '⭐', '7️⃣'];
            const WEIGHTS = [25, 20, 18, 15, 10, 7, 5];
            const PAYOUTS = { 3: 5, 4: 25, 5: 200 };
            const REEL_COUNT = 5;
            const VISIBLE = 5;
            const SYM_HEIGHT = 86;
            const STRIP_LENGTH = 50;
            const PAYLINES = [
                [2, 2, 2, 2, 2], // center
                [0, 0, 0, 0, 0], // top
                [4, 4, 4, 4, 4], // bottom
                [0, 1, 2, 3, 4], // diagonal
                [4, 3, 2, 1, 0] // anti-diagonal
            ];

            let balance = 1000;
            let bet = 25;
            let spinning = false;
            let reelAnims = Array(REEL_COUNT).fill(null);
            let strips = [];
            let reelData = []; // each reel's strip symbols
            let spinInterval;

            const slotMachine = document.getElementById('slotMachine');
            const balanceDisplay = document.getElementById('balanceDisplay');
            const winMsg = document.getElementById('winMessage');
            const spinBtn = document.getElementById('spinButton');
            const winPopupOverlay = document.getElementById('winPopupOverlay');
            const bonusPopupOverlay = document.getElementById('bonusPopupOverlay');
            const popupIcon = document.getElementById('popupIcon');
            const popupTitle = document.getElementById('popupTitle');
            const popupAmount = document.getElementById('popupAmount');
            const bonusAmount = document.getElementById('bonusAmount');

            // Build reels
            function createReels() {
                slotMachine.innerHTML = '';
                for (let i = 0; i < REEL_COUNT; i++) {
                    const reel = document.createElement('div');
                    reel.className = 'reel';
                    const strip = document.createElement('div');
                    strip.className = 'reel-strip';
                    strip.id = 'strip' + i;
                    reel.appendChild(strip);
                    slotMachine.appendChild(reel);
                }
                strips = Array.from(document.querySelectorAll('.reel-strip'));
            }

            function getSymbol() {
                const total = WEIGHTS.reduce((a, b) => a + b, 0);
                let r = Math.random() * total;
                for (let i = 0; i < SYMBOLS.length; i++) {
                    r -= WEIGHTS[i];
                    if (r <= 0) return SYMBOLS[i];
                }
                return SYMBOLS[0];
            }

            function fillStrip(stripEl, centerSymbol = null) {
                const frag = document.createDocumentFragment();
                const symbols = [];
                for (let i = 0; i < STRIP_LENGTH; i++) {
                    const sym = (centerSymbol && i === Math.floor(STRIP_LENGTH / 2)) ? centerSymbol : getSymbol();
                    symbols.push(sym);
                    const div = document.createElement('div');
                    div.className = 'symbol';
                    div.textContent = sym;
                    frag.appendChild(div);
                }
                stripEl.innerHTML = '';
                stripEl.appendChild(frag);
                return symbols;
            }

            function resetReels() {
                reelData = [];
                for (let i = 0; i < REEL_COUNT; i++) {
                    const syms = fillStrip(strips[i], getSymbol());
                    reelData.push(syms);
                    strips[i].style.transition = 'none';
                    strips[i].style.transform = `translateY(-${SYM_HEIGHT * 2}px)`;
                }
            }

            function updateBalance() {
                balanceDisplay.textContent = balance.toLocaleString();
            }

            // Win checking across paylines
            function checkAllLines() {
                let totalWin = 0;
                let maxMatch = 0;
                let winningSymbol = null;
                const winPositions = []; // array of {reel, row}

                for (const line of PAYLINES) {
                    const firstSym = reelData[0][line[0] + Math.floor(STRIP_LENGTH / 2) - 2]; // index mapping? Wait, we need actual visible symbols. The strip length is 50, center index is 25. Visible rows: 23,24,25,26,27? Actually easier: we stored reelData as full strip; the center is index 25. The visible rows are 23 (top) to 27 (bottom) if we offset -2. So row 0 => index 23, row 2 => 25, row 4 => 27.
                    const centerIndex = Math.floor(STRIP_LENGTH / 2); // 25
                    const getVisibleSymbol = (reelIdx, row) => reelData[reelIdx][centerIndex - 2 + row];

                    let sym = getVisibleSymbol(0, line[0]);
                    let count = 1;
                    let positions = [{ reel: 0, row: line[0] }];
                    for (let r = 1; r < REEL_COUNT; r++) {
                        const nextSym = getVisibleSymbol(r, line[r]);
                        if (nextSym === sym) {
                            count++;
                            positions.push({ reel: r, row: line[r] });
                        } else break;
                    }
                    if (count >= 3) {
                        const win = bet * (PAYOUTS[count] || 5);
                        totalWin += win;
                        if (count > maxMatch) { maxMatch = count;
                            winningSymbol = sym; }
                        winPositions.push(...positions.slice(0, count));
                    }
                }
                return { totalWin, maxMatch, winningSymbol, winPositions };
            }

            // Spin
            function spin() {
                if (spinning || balance < bet) return;
                initAudio();
                balance -= bet;
                updateBalance();
                winMsg.textContent = '';
                spinning = true;
                spinBtn.disabled = true;
                hidePopups();

                // Cancel existing
                reelAnims.forEach(id => { if (id) cancelAnimationFrame(id); });
                if (spinInterval) clearInterval(spinInterval);
                spinInterval = setInterval(soundSpin, 50);

                // Generate new reel data
                reelData = [];
                const targetCenters = [];
                for (let i = 0; i < REEL_COUNT; i++) targetCenters.push(getSymbol());

                strips.forEach((strip, i) => {
                    reelData.push(fillStrip(strip, targetCenters[i]));
                    strip.style.transition = 'none';
                    strip.style.transform = `translateY(-${SYM_HEIGHT * 2}px)`;
                    strip.classList.remove('spinning', 'stopping');
                    strip.offsetHeight;

                    const dur = 400 + i * 150 + Math.random() * 200;
                    const speed = 30;
                    const targetY = -SYM_HEIGHT * 2;
                    const start = Date.now();

                    function animate() {
                        const elapsed = Date.now() - start;
                        if (elapsed < dur) {
                            let cur = parseFloat(strip.style.transform.replace('translateY(', '').replace('px)',
                                '')) || targetY;
                            cur -= speed;
                            const maxScroll = (STRIP_LENGTH - VISIBLE) * SYM_HEIGHT;
                            if (cur < -maxScroll) cur = targetY;
                            strip.style.transform = `translateY(${cur}px)`;
                            strip.classList.add('spinning');
                            strip.classList.remove('stopping');
                            reelAnims[i] = requestAnimationFrame(animate);
                        } else {
                            strip.classList.remove('spinning');
                            strip.classList.add('stopping');
                            strip.style.transform = `translateY(${targetY}px)`;
                            soundStop();
                            reelAnims[i] = null;
                            // after last reel
                            if (reelAnims.every(a => a === null)) {
                                clearInterval(spinInterval);
                                setTimeout(evaluate, 300);
                            }
                        }
                    }
                    reelAnims[i] = requestAnimationFrame(animate);
                });
            }

            function evaluate() {
                spinning = false;
                spinBtn.disabled = false;
                const { totalWin, maxMatch, winningSymbol, winPositions } = checkAllLines();

                // Highlight winning symbols
                strips.forEach(strip => strip.querySelectorAll('.symbol').forEach(s => s.classList.remove(
                    'win-symbol')));
                winPositions.forEach(pos => {
                    const strip = strips[pos.reel];
                    const centerIdx = Math.floor(STRIP_LENGTH / 2);
                    const symIdx = centerIdx - 2 + pos.row;
                    const symEl = strip.children[symIdx];
                    if (symEl) symEl.classList.add('win-symbol');
                });

                if (totalWin > 0) {
                    balance += totalWin;
                    updateBalance();
                    if (maxMatch === 5) {
                        winMsg.textContent = '🌌 MEGA JACKPOT!';
                        megaEffects();
                        soundMega();
                        showWinPopup('mega', totalWin);
                    } else if (maxMatch === 4) {
                        winMsg.textContent = `🔥 BIG WIN +${totalWin.toLocaleString()}`;
                        bigWinEffects();
                        soundBigWin();
                        showWinPopup('big', totalWin);
                    } else {
                        winMsg.textContent = `✨ WIN +${totalWin.toLocaleString()}`;
                        smallWinEffects();
                        soundWin();
                        showWinPopup('win', totalWin);
                    }
                } else {
                    winMsg.textContent = '😞 TRY AGAIN';
                }

                // Random bonus
                if (Math.random() < 0.2) {
                    const bonus = Math.floor(bet * (1 + Math.random() * 10));
                    balance += bonus;
                    updateBalance();
                    soundBonus();
                    setTimeout(() => showBonusPopup(bonus), 600);
                }
            }

            // Effects
            function spawnConfetti(count, colors) {
                const shapes = ['⬤', '◆', '▲', '★', '💰', '💎', '✨'];
                const layer = document.getElementById('particlesLayer');
                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.top = -(Math.random() * 50) + 'px';
                    el.style.color = colors[Math.floor(Math.random() * colors.length)];
                    el.style.fontSize = (10 + Math.random() * 25) + 'px';
                    el.style.setProperty('--fall-dur', (1.5 + Math.random() * 2) + 's');
                    el.style.setProperty('--fall-delay', Math.random() * 0.5 + 's');

                    setTimeout(() => el.remove(), 3500);

            }

            function coinRain(count) {
                const layer = document.getElementById('particlesLayer');
                for (let i = 0; i < count; i++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin-rain';
                    coin.textContent = '🪙';
                    coin.style.left = Math.random() * 100 + '%';
                    coin.style.top = -(Math.random() * 80) + 'px';
                    coin.style.setProperty('--coin-dur', (1 + Math.random() * 2) + 's');
                    coin.style.setProperty('--coin-delay', Math.random() * 1 + 's');
                    layer.appendChild(coin);
                    setTimeout(() => coin.remove(), 3000);

            function lightning() {
                const flash = document.createElement('div');
                flash.className = 'lightning-flash';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 200);

            function megaEffects() {
                lightning();
                spawnConfetti(150, ['#fff', '#ffd700', '#ff0', '#f90', '#f00', '#f0f']);
                coinRain(80);
                const rect = slotMachine.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const spark = document.createElement('div');
                        spark.className = 'spark';

                        spark.style.top = (cy + (Math.random() - 0.5) * 200) + 'px';
                        spark.style.width = '8px';
                        spark.style.height = '8px';
                        spark.style.background = '#ffd700';
                        spark.style.boxShadow = '0 0 20px gold';
                        spark.style.setProperty('--sx', (Math.random() - 0.5) * 200 + 'px');
                        spark.style.setProperty('--sy', (Math.random() - 0.5) * 200 + 'px');
                        spark.style.setProperty('--spark-delay', '0s');
                        document.getElementById('particlesLayer').appendChild(spark);
                        setTimeout(() => spark.remove(), 800);
                    }, i * 200);
                }
            }

            function bigWinEffects() {
                spawnConfetti(70, ['#ffd700', '#ff0', '#f90']);
                coinRain(40);

            function smallWinEffects() {
                spawnConfetti(30, ['#ffd700', '#ff0']);
                coinRain(15);

            // Popups
            function showWinPopup(type, amount) {
                winPopupOverlay.classList.add('active');
                if (type === 'mega') {
                    popupIcon.textContent = '🌌';
                    popupTitle.textContent = 'MEGA JACKPOT!';
                } else if (type === 'big') {
                    popupIcon.textContent = '🔥';
                    popupTitle.textContent = 'BIG WIN!';
                } else {
                    popupIcon.textContent = '✨';
                    popupTitle.textContent = 'YOU WIN!';
                }
                popupAmount.textContent = '+' + amount.toLocaleString();
                const popup = winPopupOverlay.querySelector('.win-popup');
                popup.style.animation = 'none';
                popup.offsetHeight;
                popup.style.animation = 'popupBounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            }

            function showBonusPopup(amount) {
                bonusPopupOverlay.classList.add('active');
                bonusAmount.textContent = '+' + amount.toLocaleString();
            }

            function hidePopups() {
                winPopupOverlay.classList.remove('active');
                bonusPopupOverlay.classList.remove('active');
            }

            document.getElementById('popupCloseBtn').addEventListener('click', () => winPopupOverlay.classList.remove(
                'active'));
            document.getElementById('bonusCollectBtn').addEventListener('click', () => bonusPopupOverlay.classList
                .remove('active'));
            winPopupOverlay.addEventListener('click', e => { if (e.target === winPopupOverlay) winPopupOverlay
                    .classList.remove('active'); });
            bonusPopupOverlay.addEventListener('click', e => { if (e.target === bonusPopupOverlay)
                bonusPopupOverlay.classList.remove('active'); });

            spinBtn.addEventListener('click', spin);
            document.addEventListener('keydown', e => {
                if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault();
                    spin(); }
                if (e.code === 'Escape') hidePopups();
            });

            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (spinning) return;
                    document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    bet = parseInt(btn.dataset.bet);
                });
            });

            // Init
            createReels();
            resetReels();

            // Background stars
            const bg = document.getElementById('cosmicBg');
            for (let i = 0; i < 80; i++) {

                star.style.top = Math.random() * 100 + '%';
                star.style.width = (1 + Math.random() * 3) + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--dur', (1 + Math.random() * 3) + 's');
                star.style.setProperty('--delay', Math.random() * 3 + 's');
                bg.appendChild(star);
            }
        })();
