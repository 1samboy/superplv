<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎰 SUPER ACE - Cascading Slots</title>
    <style>
        :root {
            --gold: #ffd700;
            --reel-bg: #09091e;
            --border-color: #5a3a8a;
            --cell-height: calc((100vh - 280px) / 4);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at center, #0a0a2e 0%, #020212 100%);
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .game-container {
            width: 95vw;
            max-width: 500px;
            height: 98vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .title {
            font-size: 2.2em;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(180deg, #fffde0, #ffd700, #ffb300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px gold);
            text-align: center;
        }
        .subtitle {
            color: #ffd700aa;
            font-size: 0.65em;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 5px;
        }
        .balance-bar {
            background: #1f1f48;
            border: 2px solid #ffd70055;
            border-radius: 30px;
            padding: 8px 25px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
        }
        .balance {
            font-size: 1.6em;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 15px gold;
        }
        .slot-area {
            position: relative;
            width: 100%;
            height: calc(4 * var(--cell-height) + 12px);
            background: linear-gradient(180deg, #2c1c58, #1b0b3c);
            border: 4px solid var(--border-color);
            border-radius: 18px;
            box-shadow: inset 0 6px 25px rgba(0,0,0,0.8), 0 0 40px rgba(179,71,234,0.3);
            overflow: hidden;
        }
        /* Reels layer (spinning) */
        .reels-layer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 6px;
            height: 100%;
            width: 100%;
            padding: 4px;
            z-index: 1;
        }
        .reel {
            width: 18%;
            height: 100%;
            background: var(--reel-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #3a2a62;
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        .reel-strip.spinning {
            animation: blurSpin 0.04s linear infinite;
        }
        @keyframes blurSpin {
            0% { filter: blur(0); }
            50% { filter: blur(3px); }
            100% { filter: blur(0); }
        }
        .reel-strip.stopping {
            transition: transform 0.5s cubic-bezier(0.08, 0.82, 0.17, 1);
            filter: none !important;
            animation: none !important;
        }
        .reel-symbol {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--cell-height) * 0.7);
            height: var(--cell-height);
            color: white;
            filter: drop-shadow(0 0 4px white);
            flex-shrink: 0;
        }
        /* Grid layer (after stop) */
        .grid-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, var(--cell-height));
            gap: 4px;
            padding: 4px;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .grid-layer.active {
            opacity: 1;
            pointer-events: auto;
        }
        .grid-cell {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--cell-height) * 0.65);
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            transition: transform 0.2s, opacity 0.2s;
        }
        .grid-cell.win {
            animation: explode 0.4s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .grid-cell.drop {
            animation: dropIn 0.3s ease-out;
        }
        @keyframes dropIn {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .grid-cell.golden {
            box-shadow: 0 0 15px gold;
            border: 2px solid gold;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .bet-btn {
            background: #1a1a35;
            border: 2px solid #ffffff22;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: 0.2s;
        }
        .bet-btn.active {
            background: #ffd70022;
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 20px rgba(255,215,0,0.4);
        }
        .spin-btn {
            background: linear-gradient(180deg, #ff4d4d, #cc0000);
            border: none;
            color: white;
            font-size: 1.4em;
            font-weight: 900;
            padding: 14px 45px;
            border-radius: 50px;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(255,0,0,0.5);
            transition: 0.2s;
        }
        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        .message {
            height: 20px;
            color: var(--gold);
            font-weight: 700;
            text-shadow: 0 0 10px gold;
            margin: 4px 0;
        }
        /* Popups */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .popup-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .popup-dialog {
            background: linear-gradient(180deg, #1c1c45, #0e0e2c);
            border: 3px solid var(--gold);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 70px rgba(255,215,0,0.8);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .popup-btn {
            background: #ffd700;
            border: none;
            color: #1a1a2e;
            font-weight: 900;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div class="particles" id="particlesLayer"></div>

    <!-- Win Popup -->
    <div class="popup-overlay" id="winPopup">
        <div class="popup-dialog">
            <div style="font-size:3em;" id="popupIcon">🎉</div>
            <div style="font-size:1.8em; font-weight:900; color: gold;" id="popupTitle"></div>
            <div style="font-size:2.4em; font-weight:900; color: gold; margin:10px 0;" id="popupAmount"></div>
            <button class="popup-btn" id="popupClose">COLLECT</button>
        </div>
    </div>
    <!-- Bonus Popup -->
    <div class="popup-overlay" id="bonusPopup">
        <div class="popup-dialog">
            <div style="font-size:3em;">🎁</div>
            <div style="font-size:1.5em; font-weight:900; color: gold;">MYSTERY BONUS!</div>
            <div style="font-size:2.2em; font-weight:900; color: gold;" id="bonusAmount"></div>
            <button class="popup-btn" id="bonusClose">COLLECT</button>
        </div>
    </div>

    <div class="game-container">
        <div class="title">👑 SUPER PLV</div>
        <div class="subtitle">★ SUPER ACE CASCADES ★</div>
        <div class="balance-bar">
            <span style="color:#aaa;">💰</span>
            <span class="balance" id="balanceDisplay">1,000</span>
        </div>
        <div class="slot-area" id="slotArea">
            <div class="reels-layer" id="reelsLayer"></div>
            <div class="grid-layer" id="gridLayer"></div>
        </div>
        <div class="message" id="message"></div>
        <div class="controls">
            <span style="color:#aaa;">BET:</span>
            <button class="bet-btn active" data-bet="25">25</button>
            <button class="bet-btn" data-bet="50">50</button>
            <button class="bet-btn" data-bet="100">100</button>
            <button class="bet-btn" data-bet="500">500</button>
            <button class="spin-btn" id="spinButton">⚡ SPIN</button>
        </div>
    </div>

    <script>
    (function() {
        // Audio
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new AudioCtx();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function tone(f,d,t='sine',v=0.1) {
            if(!audioCtx) return;
            try {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime+d);
            } catch(e){}
        }
        function sSpin() { tone(100+Math.random()*200,0.03,'square',0.04); }
        function sStop() { tone(300,0.05,'square',0.07); }
        function sWin() { tone(523,0.12); setTimeout(()=>tone(659,0.12),120); setTimeout(()=>tone(784,0.2),240); }
        function sBigWin() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.18),i*100)); }
        function sMega() { [523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'sine',0.22),i*70)); }

        // Symbols
        const SYMBOLS = ['🍒','🍋','🍊','💎','👑','⭐','7️⃣']; // ⭐ is scatter, 🃏 is golden card (added later)
        const WEIGHTS = [20,18,16,12,8,6,4];
        const SCATTER = '⭐';
        const GOLDEN = '🃏';
        const PAYTABLE = {3:5, 4:25, 5:200}; // ways to win (left to right)
        const SCATTER_PAY = {3:5, 4:20, 5:50}; // scatter payouts (multiplied by total bet)

        // Grid dimensions
        const COLS = 5, ROWS = 4;
        let cellHeight = 80; // set dynamically

        // Game state
        let balance = 1000, bet = 25, spinning = false;
        let reelsStrips = []; // array of arrays (column symbols)
        let visibleSymbols = []; // 2D array [col][row] after stop
        let cascadeMultiplier = 1;
        let goldenCardPos = null; // {col, row} where golden card appears initially

        // DOM
        const reelsLayer = document.getElementById('reelsLayer');
        const gridLayer = document.getElementById('gridLayer');
        const slotArea = document.getElementById('slotArea');
        const spinBtn = document.getElementById('spinButton');
        const balanceEl = document.getElementById('balanceDisplay');
        const msgEl = document.getElementById('message');
        const winPopup = document.getElementById('winPopup');
        const bonusPopup = document.getElementById('bonusPopup');

        // Build reels
        function buildReels() {
            reelsLayer.innerHTML = '';
            for(let c=0; c<COLS; c++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                const strip = document.createElement('div');
                strip.className = 'reel-strip';
                strip.id = `strip${c}`;
                reel.appendChild(strip);
                reelsLayer.appendChild(reel);
            }
            // cellHeight from CSS var
            cellHeight = slotArea.clientHeight / ROWS;
            document.documentElement.style.setProperty('--cell-height', cellHeight+'px');
        }

        function getRandomSymbol() {
            const total = WEIGHTS.reduce((a,b)=>a+b,0);
            let r = Math.random()*total;
            for(let i=0;i<SYMBOLS.length;i++) {
                r -= WEIGHTS[i];
                if(r<=0) return SYMBOLS[i];
            }
            return SYMBOLS[0];
        }

        // Fill strip with random symbols, optionally set specific visible range
        function fillStrip(col, visibleStart, visibleSymbols) {
            const strip = document.getElementById(`strip${col}`);
            const frag = document.createDocumentFragment();
            const totalSymbols = 20 + ROWS; // extra buffer
            const symbols = [];
            const startIdx = 10; // index where visible rows begin
            for(let i=0; i<totalSymbols; i++) {
                let sym;
                if(i >= startIdx && i < startIdx+ROWS) {
                    sym = visibleSymbols[i-startIdx];
                } else {
                    sym = getRandomSymbol();
                }
                symbols.push(sym);
                const div = document.createElement('div');
                div.className = 'reel-symbol';
                div.textContent = sym;
                frag.appendChild(div);
            }
            strip.innerHTML = '';
            strip.appendChild(frag);
            return { symbols, startIdx };
        }

        function spinReels() {
            if(spinning || balance<bet) return;
            initAudio();
            balance -= bet;
            updateBalance();
            msgEl.textContent = '';
            gridLayer.classList.remove('active');
            spinning = true;
            spinBtn.disabled = true;
            hidePopups();

            // Generate result symbols for each column
            visibleSymbols = [];
            for(let c=0; c<COLS; c++) {
                const colSyms = [];
                for(let r=0; r<ROWS; r++) colSyms.push(getRandomSymbol());
                visibleSymbols.push(colSyms);
            }
            // Decide golden card position (random, but not scatter)
            goldenCardPos = null;
            if(Math.random() < 0.3) { // 30% chance
                const col = Math.floor(Math.random()*COLS);
                const row = Math.floor(Math.random()*ROWS);
                visibleSymbols[col][row] = GOLDEN;
                goldenCardPos = {col, row};
            }

            // Fill strips
            const stripsData = [];
            for(let c=0; c<COLS; c++) {
                stripsData.push(fillStrip(c, 10, visibleSymbols[c]));
            }
            reelsStrips = stripsData;

            // Spin animation
            const durations = Array.from({length:COLS}, (_,i)=> 500 + i*180 + Math.random()*200);
            const speed = 28;
            const targetTransform = `translateY(-${10 * cellHeight}px)`;
            const maxScroll = -(stripsData[0].symbols.length - ROWS) * cellHeight;
            const stripEls = Array.from(document.querySelectorAll('.reel-strip'));

            let spinInterval = setInterval(sSpin, 50);
            let stopCount = 0;
            const animIds = [];

            stripEls.forEach((strip, i) => {
                strip.style.transition = 'none';
                strip.style.transform = targetTransform;
                strip.classList.remove('spinning','stopping');
                void strip.offsetHeight;
                const start = Date.now();
                function animate() {
                    const elapsed = Date.now() - start;
                    if(elapsed < durations[i]) {
                        let cur = parseFloat(strip.style.transform.replace('translateY(','').replace('px)','')) || parseFloat(targetTransform);
                        cur -= speed;
                        if(cur < maxScroll) cur = parseFloat(targetTransform);
                        strip.style.transform = `translateY(${cur}px)`;
                        strip.classList.add('spinning');
                        strip.classList.remove('stopping');
                        animIds[i] = requestAnimationFrame(animate);
                    } else {
                        strip.classList.remove('spinning');
                        strip.classList.add('stopping');
                        strip.style.transform = targetTransform;
                        sStop();
                        stopCount++;
                        animIds[i] = null;
                        if(stopCount === COLS) {
                            clearInterval(spinInterval);
                            setTimeout(() => {
                                startCascades();
                            }, 300);
                        }
                    }
                }
                animIds[i] = requestAnimationFrame(animate);
            });
        }

        function updateBalance() {
            balanceEl.textContent = balance.toLocaleString();
        }

        // Grid manipulation
        function renderGrid(symbolsGrid) {
            gridLayer.innerHTML = '';
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.textContent = symbolsGrid[c][r];
                    cell.dataset.col = c;
                    cell.dataset.row = r;
                    if(symbolsGrid[c][r] === GOLDEN) cell.classList.add('golden');
                    gridLayer.appendChild(cell);
                }
            }
            gridLayer.classList.add('active');
        }

        // Evaluate wins left-to-right (1024 ways style)
        function evaluateWins(grid) {
            let totalWin = 0;
            let maxMultiplier = 1;
            const winningCells = []; // {col, row}
            // Check each starting row? In 1024 ways, any row combination wins. We'll check all rows for each symbol.
            // Simpler: iterate columns, for each symbol in first column, check consecutive matches across rows (each row independently)
            for(let r=0; r<ROWS; r++) {
                const sym = grid[0][r];
                if(sym === SCATTER || sym === GOLDEN) continue; // scatter handled separately
                let count = 1;
                const positions = [{col:0, row:r}];
                for(let c=1; c<COLS; c++) {
                    let found = false;
                    for(let rr=0; rr<ROWS; rr++) {
                        if(grid[c][rr] === sym || grid[c][rr] === GOLDEN) { // golden acts as wild during evaluation? We'll handle golden separately later, but for initial eval it's wild
                            positions.push({col:c, row:rr});
                            found = true;
                            break;
                        }
                    }
                    if(found) count++;
                    else break;
                }
                if(count >= 3) {
                    const win = bet * (PAYTABLE[count] || 5) * cascadeMultiplier;
                    totalWin += win;
                    if(count > maxMultiplier) maxMultiplier = count;
                    // Add positions up to count
                    for(let i=0; i<count; i++) winningCells.push(positions[i]);
                }
            }
            // Scatter wins (anywhere)
            let scatterCount = 0;
            grid.forEach(col => col.forEach(sym => { if(sym === SCATTER) scatterCount++; }));
            if(scatterCount >= 3) {
                totalWin += bet * (SCATTER_PAY[scatterCount] || 5) * cascadeMultiplier;
            }
            return { totalWin, winningCells };
        }

        function removeWinningCells(winningCells) {
            const cells = Array.from(gridLayer.children);
            winningCells.forEach(pos => {
                const cell = cells.find(c => c.dataset.col == pos.col && c.dataset.row == pos.row);
                if(cell) cell.classList.add('win');
            });
            return new Promise(resolve => setTimeout(resolve, 400));
        }

        function applyGravityAndRefill(grid) {
            // Create new grid after removing winning symbols
            const newGrid = Array.from({length: COLS}, () => []);
            // For each column, filter out removed cells, then shift down and fill top
            grid.forEach((col, c) => {
                const remaining = col.filter((sym, r) => {
                    // check if this cell is winning (marked)
                    const cell = gridLayer.querySelector(`.grid-cell[data-col="${c}"][data-row="${r}"]`);
                    return !cell || !cell.classList.contains('win');
                });
                // Shift down: put remaining at bottom, fill top with new symbols
                const newCol = [];
                for(let r=0; r<ROWS - remaining.length; r++) {
                    newCol.push(getRandomSymbol());
                }
                newCol.push(...remaining);
                newGrid[c] = newCol;
            });
            return newGrid;
        }

        async function startCascades() {
            // Transfer visible symbols to grid
            let currentGrid = visibleSymbols.map(col => [...col]);
            renderGrid(currentGrid);
            reelsLayer.style.display = 'none'; // hide reels

            let cascadeCount = 0;
            cascadeMultiplier = 1;
            const cascadeMultipliers = [1, 2, 3, 5]; // consecutive cascades multiplier

            // If golden card present, after first cascade (or initial?) it transforms
            let goldenTransformed = false;

            while(true) {
                const { totalWin, winningCells } = evaluateWins(currentGrid);
                if(totalWin <= 0 || winningCells.length === 0) break;

                cascadeCount++;
                if(cascadeCount > 1) cascadeMultiplier = cascadeMultipliers[Math.min(cascadeCount-1, cascadeMultipliers.length-1)];

                // Apply multiplier to this cascade win
                balance += totalWin;
                updateBalance();
                msgEl.textContent = `Cascade ${cascadeCount}! +${totalWin.toLocaleString()}`;
                sWin();
                if(cascadeCount >= 3) sBigWin();

                // Highlight winning cells and remove
                await removeWinningCells(winningCells);

                // After first cascade, if golden card present, transform it
                if(!goldenTransformed && goldenCardPos) {
                    const col = goldenCardPos.col, row = goldenCardPos.row;
                    const cell = gridLayer.querySelector(`.grid-cell[data-col="${col}"][data-row="${row}"]`);
                    if(cell && cell.textContent === GOLDEN) {
                        // Change to a random non-scatter symbol that appears on reels to help win
                        const possibleSymbols = SYMBOLS.filter(s => s !== SCATTER && s !== GOLDEN);
                        const newSym = possibleSymbols[Math.floor(Math.random()*possibleSymbols.length)];
                        cell.textContent = newSym;
                        cell.classList.remove('golden');
                        currentGrid[col][row] = newSym;
                    }
                    goldenTransformed = true;
                }

                // Apply gravity and refill
                currentGrid = applyGravityAndRefill(currentGrid);
                renderGrid(currentGrid);
                // small delay to show new symbols
                await new Promise(r => setTimeout(r, 300));
            }

            // End of cascades
            if(cascadeCount === 0) {
                msgEl.textContent = '😞 No win';
            } else if(cascadeCount >= 4) {
                msgEl.textContent = '🌌 MEGA CASCADE!';
                sMega();
                megaEffects();
            }

            // Bonus chance
            if(Math.random() < 0.2) {
                const bonus = Math.floor(bet * (2 + Math.random()*8));
                balance += bonus;
                updateBalance();
                showBonusPopup(bonus);
            }

            // Reset for next spin
            reelsLayer.style.display = '';
            gridLayer.classList.remove('active');
            spinning = false;
            spinBtn.disabled = false;
            goldenCardPos = null;
            cascadeMultiplier = 1;
        }

        // Effects
        function spawnConfetti(count, colors) {
            const shapes = ['⬤','◆','▲','★','💰','💎'];
            const layer = document.getElementById('particlesLayer');
            for(let i=0;i<count;i++) {
                const el = document.createElement('div');
                el.style.position='absolute';
                el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
                el.style.left = Math.random()*100+'%';
                el.style.top = -(Math.random()*50)+'px';
                el.style.color = colors[Math.floor(Math.random()*colors.length)];
                el.style.fontSize = (10+Math.random()*25)+'px';
                el.style.animation = `fall ${1.5+Math.random()*2}s linear forwards`;
                layer.appendChild(el);
                setTimeout(()=>el.remove(), 3500);
            }
        }
        function megaEffects() {
            spawnConfetti(120, ['#fff','#ffd700','#ff0','#f90','#f00','#f0f']);
            const rect = slotArea.getBoundingClientRect();
            const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
            for(let i=0;i<3;i++) {
                setTimeout(()=>{
                    const spark = document.createElement('div');
                    spark.style.cssText = `position:absolute;left:${cx+(Math.random()-0.5)*300}px;top:${cy+(Math.random()-0.5)*200}px;width:8px;height:8px;background:gold;box-shadow:0 0 20px gold;border-radius:50%;animation:burst 0.8s ease-out forwards;`;
                    document.getElementById('particlesLayer').appendChild(spark);
                    setTimeout(()=>spark.remove(),800);
                }, i*200);
            }
        }

        // Popups
        function showWinPopup(type, amount) {
            winPopup.classList.add('active');
            document.getElementById('popupAmount').textContent = '+'+amount.toLocaleString();
            if(type==='mega') {
                document.getElementById('popupIcon').textContent='🌌';
                document.getElementById('popupTitle').textContent='MEGA WIN!';
            } else {
                document.getElementById('popupIcon').textContent='🎉';
                document.getElementById('popupTitle').textContent='BIG WIN!';
            }
        }
        function showBonusPopup(amount) {
            bonusPopup.classList.add('active');
            document.getElementById('bonusAmount').textContent = '+'+amount.toLocaleString();
        }
        function hidePopups() {
            winPopup.classList.remove('active');
            bonusPopup.classList.remove('active');
        }

        // Event listeners
        spinBtn.addEventListener('click', spinReels);
        document.addEventListener('keydown', e => {
            if(e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); spinReels(); }
            if(e.code === 'Escape') hidePopups();
        });
        document.getElementById('popupClose').addEventListener('click', ()=>winPopup.classList.remove('active'));
        document.getElementById('bonusClose').addEventListener('click', ()=>bonusPopup.classList.remove('active'));
        winPopup.addEventListener('click', e=>{ if(e.target===winPopup) winPopup.classList.remove('active'); });
        bonusPopup.addEventListener('click', e=>{ if(e.target===bonusPopup) bonusPopup.classList.remove('active'); });

        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.addEventListener('click', ()=>{
                if(spinning) return;
                document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                bet = parseInt(btn.dataset.bet);
            });
        });

        window.addEventListener('resize', () => {
            cellHeight = slotArea.clientHeight / ROWS;
            document.documentElement.style.setProperty('--cell-height', cellHeight+'px');
            // reposition reels if visible
            if(!spinning) {
                const strips = document.querySelectorAll('.reel-strip');
                strips.forEach(s => s.style.transform = `translateY(-${10*cellHeight}px)`);
            }
        });

        // Initial build
        buildReels();
        // Pre-fill strips with random symbols for initial look
        for(let c=0; c<COLS; c++) {
            const colSyms = [];
            for(let r=0; r<ROWS; r++) colSyms.push(getRandomSymbol());
            visibleSymbols.push(colSyms);
            fillStrip(c, 10, colSyms);
        }
        const strips = document.querySelectorAll('.reel-strip');
        strips.forEach(s => s.style.transform = `translateY(-${10*cellHeight}px)`);
        updateBalance();
    })();
    </script>
</body>
</html>
