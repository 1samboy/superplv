<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 SUPER PLV - 5x5 Mega Slots (Always Centered)</title>
    <style>
        :root {
            --gold: #ffd700;
            --neon-pink: #ff2d95;
            --neon-blue: #00d4ff;
            --panel: #1a1a35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020212;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            height: 100vh;
            width: 100vw;
        }

        /* Fixed centering wrapper */
        .game-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            width: 95vw;
            max-width: 750px;
            max-height: 98vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: linear-gradient(180deg, #1c1c45 0%, #0e0e2c 30%, #08081e 100%);
            border: 3px solid var(--gold);
            border-radius: 28px;
            padding: 15px 20px 20px;
            box-shadow: 0 0 70px rgba(255, 215, 0, 0.5), 0 20px 60px rgba(0, 0, 0, 0.9);
            width: 100%;
            max-height: 96vh;
            overflow-y: auto;
            overflow-x: hidden;
            text-align: center;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .game-container::-webkit-scrollbar {
            display: none;
        }

        .title-area {
            margin-bottom: 8px;
        }
        .title {
            font-size: clamp(1.8em, 5vw, 2.8em);
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(180deg, #fffde0, #ffd700, #ffb300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px gold);
        }
        .subtitle {
            color: #ffd700aa;
            font-size: 0.7em;
            letter-spacing: 8px;
        }

        .balance-display {
            background: #1f1f48;
            border: 2px solid #ffd70055;
            border-radius: 30px;
            padding: 8px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .balance-amount {
            font-size: 1.5em;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 15px gold;
        }

        /* Slot machine uses viewport-based height */
        .slot-machine {
            background: linear-gradient(180deg, #2c1c58, #1b0b3c);
            border: 4px solid #5a3a8a;
            border-radius: 18px;
            padding: 10px 5px;
            display: flex;
            justify-content: center;
            gap: 6px;
            box-shadow: inset 0 6px 30px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
            width: fit-content;
        }

        .reel {
            width: clamp(60px, 15vw, 110px);
            height: 60vh;
            max-height: 400px;
            background: #09091e;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #3a2a62;
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        .reel-strip.spinning {
            animation: blurSpin 0.04s linear infinite;
        }
        @keyframes blurSpin {
            0%,
            100% {
                filter: blur(0);
            }
            50% {
                filter: blur(2px);
            }
        }
        .reel-strip.stopping {
            transition: transform 0.5s cubic-bezier(0.08, 0.82, 0.17, 1);
            filter: none !important;
            animation: none !important;
        }

        .symbol {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2em, 6vw, 3.4em);
            filter: drop-shadow(0 0 4px white);
            flex-shrink: 0;
        }
        .symbol.win-symbol {
            animation: symbolPop 0.4s ease-out;
            filter: drop-shadow(0 0 20px gold) !important;
        }
        @keyframes symbolPop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }

        .bet-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .bet-btn {
            background: var(--panel);
            border: 2px solid #ffffff18;
            color: #ccc;
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: 0.2s;
        }
        .bet-btn.active {
            background: #ffd70022;
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .spin-btn {
            background: linear-gradient(180deg, #ff4d4d, #cc0000);
            border: none;
            color: white;
            font-size: 1.4em;
            font-weight: 900;
            padding: 14px 45px;
            border-radius: 50px;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(255, 0, 0, 0.5);
            transition: 0.2s;
        }
        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .win-message {
            height: 24px;
            margin: 6px 0;
            font-weight: 700;
            color: var(--gold);
            font-size: 1.1em;
            text-shadow: 0 0 10px gold;
        }

        /* Popups */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .popup-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .popup-dialog {
            background: linear-gradient(180deg, #1c1c45, #0e0e2c);
            border: 3px solid var(--gold);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.8);
            animation: popupBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 380px;
            width: 85%;
        }
        @keyframes popupBounce {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .popup-icon {
            font-size: 3.5em;
            animation: iconBounce 0.6s infinite;
        }
        @keyframes iconBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        .popup-title {
            font-size: 1.8em;
            font-weight: 900;
            margin: 10px 0;
            background: linear-gradient(180deg, #fffde0, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .popup-amount {
            font-size: 2.5em;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px gold;
        }
        .popup-btn {
            background: linear-gradient(180deg, #ffd700, #ffaa00);
            border: none;
            color: #1a1a2e;
            font-weight: 900;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1em;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.5);
        }

        /* Particle layer */
        .particles-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="particles-layer" id="particlesLayer"></div>

    <!-- Win Popup -->
    <div class="popup-overlay" id="winPopupOverlay">
        <div class="popup-dialog">
            <div class="popup-icon" id="popupIcon">🎉</div>
            <div class="popup-title" id="popupTitle">WIN!</div>
            <div class="popup-amount" id="popupAmount"></div>
            <button class="popup-btn" id="popupCloseBtn">🎰 COLLECT</button>
        </div>
    </div>

    <!-- Bonus Popup -->
    <div class="popup-overlay" id="bonusPopupOverlay">
        <div class="popup-dialog">
            <div class="popup-icon">🎁</div>
            <div class="popup-title">MYSTERY BONUS!</div>
            <div class="popup-amount" id="bonusAmount"></div>
            <button class="popup-btn" id="bonusCollectBtn">💰 COLLECT</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="game-container" id="gameContainer">
            <div class="title-area">
                <span class="crown-icon">👑</span>
                <div class="title">SUPER PLV</div>
                <div class="subtitle">★ 5x5 ULTRA SLOTS ★</div>
            </div>
            <div class="balance-display">
                <span>💰 BALANCE</span>
                <span class="balance-amount" id="balanceDisplay">1,000</span>
            </div>
            <div class="slot-machine" id="slotMachine"></div>
            <div class="win-message" id="winMessage"></div>
            <div class="bet-controls">
                <span style="color:#aaa;">BET:</span>
                <div id="betButtons">
                    <button class="bet-btn" data-bet="10">10</button>
                    <button class="bet-btn active" data-bet="25">25</button>
                    <button class="bet-btn" data-bet="50">50</button>
                    <button class="bet-btn" data-bet="100">100</button>
                    <button class="bet-btn" data-bet="500">MAX</button>
                </div>
            </div>
            <button class="spin-btn" id="spinButton">⚡ SPIN ⚡</button>
        </div>
    </div>

    <script>
        (function() {
            // Audio engine
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx;

            function initAudio() {
                if (!audioCtx) audioCtx = new AudioCtx();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playTone(freq, dur, type = 'sine', vol = 0.12) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + dur);
                } catch (e) {}
            }

            function soundSpin() { playTone(100 + Math.random() * 200, 0.03, 'square', 0.04); }

            function soundStop() { playTone(300, 0.05, 'square', 0.07); }

            function soundWin() { playTone(523, 0.12);
                setTimeout(() => playTone(659, 0.12), 120);
                setTimeout(() => playTone(784, 0.2), 240); }

            function soundBigWin() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'sine',
                    0.18), i * 100)); }

            function soundMega() { [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => setTimeout(() => playTone(f,
                    0.3, 'sine', 0.22), i * 70)); }

            function soundBonus() { playTone(440, 0.1, 'triangle', 0.18);
                setTimeout(() => playTone(554, 0.1, 'triangle', 0.18), 100);
                setTimeout(() => playTone(659, 0.2, 'triangle', 0.2), 200); }

            // Game constants (dynamic SYM_HEIGHT from reel height)
            const SYMBOLS = ['🍒', '🍋', '🍊', '💎', '👑', '⭐', '7️⃣'];
            const WEIGHTS = [25, 20, 18, 15, 10, 7, 5];
            const PAYOUTS = { 3: 5, 4: 25, 5: 200 };
            const REEL_COUNT = 5;
            const VISIBLE_SYMBOLS = 5;
            const STRIP_LENGTH = 50; // total symbols in strip
            const PAYLINES = [
                [2, 2, 2, 2, 2],
                [0, 0, 0, 0, 0],
                [4, 4, 4, 4, 4],
                [0, 1, 2, 3, 4],
                [4, 3, 2, 1, 0]
            ];

            let balance = 1000;
            let bet = 25;
            let spinning = false;
            let reelAnims = Array(REEL_COUNT).fill(null);
            let strips = [];
            let reelData = [];
            let SYM_HEIGHT = 86; // default, will be recalculated
            let spinInterval;

            const slotMachine = document.getElementById('slotMachine');
            const balanceDisplay = document.getElementById('balanceDisplay');
            const winMsg = document.getElementById('winMessage');
            const spinBtn = document.getElementById('spinButton');
            const winPopupOverlay = document.getElementById('winPopupOverlay');
            const bonusPopupOverlay = document.getElementById('bonusPopupOverlay');
            const popupIcon = document.getElementById('popupIcon');
            const popupTitle = document.getElementById('popupTitle');
            const popupAmount = document.getElementById('popupAmount');
            const bonusAmount = document.getElementById('bonusAmount');

            function createReels() {
                slotMachine.innerHTML = '';
                for (let i = 0; i < REEL_COUNT; i++) {
                    const reel = document.createElement('div');
                    reel.className = 'reel';
                    const strip = document.createElement('div');
                    strip.className = 'reel-strip';
                    strip.id = 'strip' + i;
                    reel.appendChild(strip);
                    slotMachine.appendChild(reel);
                }
                strips = Array.from(document.querySelectorAll('.reel-strip'));
                // calculate SYM_HEIGHT based on reel client height
                const reelEl = document.querySelector('.reel');
                if (reelEl) {
                    SYM_HEIGHT = reelEl.clientHeight / VISIBLE_SYMBOLS;
                }
                // also set symbol height via CSS variable for consistency
                document.documentElement.style.setProperty('--sym-height', SYM_HEIGHT + 'px');
            }

            function getSymbol() {
                const total = WEIGHTS.reduce((a, b) => a + b, 0);
                let r = Math.random() * total;
                for (let i = 0; i < SYMBOLS.length; i++) {
                    r -= WEIGHTS[i];
                    if (r <= 0) return SYMBOLS[i];
                }
                return SYMBOLS[0];
            }

            function fillStrip(stripEl, centerSymbol = null) {
                const frag = document.createDocumentFragment();
                const symbols = [];
                for (let i = 0; i < STRIP_LENGTH; i++) {
                    const sym = (centerSymbol && i === Math.floor(STRIP_LENGTH / 2)) ? centerSymbol : getSymbol();
                    symbols.push(sym);
                    const div = document.createElement('div');
                    div.className = 'symbol';
                    div.textContent = sym;
                    div.style.height = SYM_HEIGHT + 'px';
                    div.style.lineHeight = SYM_HEIGHT + 'px';
                    frag.appendChild(div);
                }
                stripEl.innerHTML = '';
                stripEl.appendChild(frag);
                return symbols;
            }

            function resetReels() {
                reelData = [];
                const centerRowIndex = Math.floor(STRIP_LENGTH / 2);
                for (let i = 0; i < REEL_COUNT; i++) {
                    const sym = getSymbol();
                    const syms = fillStrip(strips[i], sym);
                    reelData.push(syms);
                    strips[i].style.transition = 'none';
                    // offset to show 3rd row as center (index 2 in visible 5 rows)
                    strips[i].style.transform = `translateY(-${SYM_HEIGHT * 2}px)`;
                }
            }

            function updateBalance() {
                balanceDisplay.textContent = balance.toLocaleString();
            }

            function getVisibleSymbol(reelIdx, row) {
                const centerIdx = Math.floor(STRIP_LENGTH / 2);
                const offset = centerIdx - 2 + row;
                return reelData[reelIdx][offset];
            }

            function checkAllLines() {
                let totalWin = 0;
                let maxMatch = 0;
                const winPositions = [];
                for (const line of PAYLINES) {
                    const sym = getVisibleSymbol(0, line[0]);
                    let count = 1;
                    const positions = [{ reel: 0, row: line[0] }];
                    for (let r = 1; r < REEL_COUNT; r++) {
                        if (getVisibleSymbol(r, line[r]) === sym) {
                            count++;
                            positions.push({ reel: r, row: line[r] });
                        } else break;
                    }
                    if (count >= 3) {
                        totalWin += bet * (PAYOUTS[count] || 5);
                        if (count > maxMatch) maxMatch = count;
                        winPositions.push(...positions.slice(0, count));
                    }
                }
                return { totalWin, maxMatch, winPositions };
            }

            function spin() {
                if (spinning || balance < bet) return;
                initAudio();
                balance -= bet;
                updateBalance();
                winMsg.textContent = '';
                spinning = true;
                spinBtn.disabled = true;
                hidePopups();

                reelAnims.forEach(id => { if (id) cancelAnimationFrame(id); });
                if (spinInterval) clearInterval(spinInterval);
                spinInterval = setInterval(soundSpin, 50);

                reelData = [];
                const targetCenters = Array.from({ length: REEL_COUNT }, () => getSymbol());
                const durations = Array.from({ length: REEL_COUNT }, (_, i) => 400 + i * 150 + Math.random() *
                    200);
                const speed = 30;
                const targetY = -SYM_HEIGHT * 2;
                const maxScroll = (STRIP_LENGTH - VISIBLE_SYMBOLS) * SYM_HEIGHT;

                strips.forEach((strip, i) => {
                    reelData.push(fillStrip(strip, targetCenters[i]));
                    strip.style.transition = 'none';
                    strip.style.transform = `translateY(${targetY}px)`;
                    strip.classList.remove('spinning', 'stopping');
                    strip.offsetHeight;
                    const start = Date.now();

                    function animate() {
                        const elapsed = Date.now() - start;
                        if (elapsed < durations[i]) {
                            let cur = parseFloat(strip.style.transform.replace('translateY(', '').replace(
                                'px)', '')) || targetY;
                            cur -= speed;
                            if (cur < -maxScroll) cur = targetY;
                            strip.style.transform = `translateY(${cur}px)`;
                            strip.classList.add('spinning');
                            strip.classList.remove('stopping');
                            reelAnims[i] = requestAnimationFrame(animate);
                        } else {
                            strip.classList.remove('spinning');
                            strip.classList.add('stopping');
                            strip.style.transform = `translateY(${targetY}px)`;
                            soundStop();
                            reelAnims[i] = null;
                            if (reelAnims.every(a => a === null)) {
                                clearInterval(spinInterval);
                                setTimeout(evaluate, 300);
                            }
                        }
                    }
                    reelAnims[i] = requestAnimationFrame(animate);
                });
            }

            function evaluate() {
                spinning = false;
                spinBtn.disabled = false;
                const { totalWin, maxMatch, winPositions } = checkAllLines();

                // Remove previous win highlights
                document.querySelectorAll('.symbol.win-symbol').forEach(s => s.classList.remove('win-symbol'));
                // Highlight winning positions
                winPositions.forEach(pos => {
                    const strip = strips[pos.reel];
                    const centerIdx = Math.floor(STRIP_LENGTH / 2);
                    const symIdx = centerIdx - 2 + pos.row;
                    if (strip.children[symIdx]) strip.children[symIdx].classList.add('win-symbol');
                });

                if (totalWin > 0) {
                    balance += totalWin;
                    updateBalance();
                    if (maxMatch === 5) {
                        winMsg.textContent = '🌌 MEGA JACKPOT!';
                        megaEffects();
                        soundMega();
                        showWinPopup('mega', totalWin);
                    } else if (maxMatch === 4) {
                        winMsg.textContent = `🔥 BIG WIN +${totalWin.toLocaleString()}`;
                        bigWinEffects();
                        soundBigWin();
                        showWinPopup('big', totalWin);
                    } else {
                        winMsg.textContent = `✨ WIN +${totalWin.toLocaleString()}`;
                        smallWinEffects();
                        soundWin();
                        showWinPopup('win', totalWin);
                    }
                } else {
                    winMsg.textContent = '😞 TRY AGAIN';
                }

                // Random bonus (20% chance)
                if (Math.random() < 0.2) {
                    const bonus = Math.floor(bet * (1 + Math.random() * 10));
                    balance += bonus;
                    updateBalance();
                    soundBonus();
                    setTimeout(() => showBonusPopup(bonus), 600);
                }
            }

            // Visual effects
            function spawnConfetti(count, colors) {
                const shapes = ['⬤', '◆', '▲', '★', '💰', '💎', '✨'];
                const layer = document.getElementById('particlesLayer');
                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.top = -(Math.random() * 50) + 'px';
                    el.style.color = colors[Math.floor(Math.random() * colors.length)];
                    el.style.fontSize = (10 + Math.random() * 25) + 'px';
                    el.style.setProperty('--fall-dur', (1.5 + Math.random() * 2) + 's');
                    el.style.setProperty('--fall-delay', Math.random() * 0.5 + 's');
                    layer.appendChild(el);
                    setTimeout(() => el.remove(), 3500);
                }
            }

            function coinRain(count) {
                const layer = document.getElementById('particlesLayer');
                for (let i = 0; i < count; i++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin-rain';
                    coin.textContent = '🪙';
                    coin.style.left = Math.random() * 100 + '%';
                    coin.style.top = -(Math.random() * 80) + 'px';
                    coin.style.setProperty('--coin-dur', (1 + Math.random() * 2) + 's');
                    coin.style.setProperty('--coin-delay', Math.random() * 1 + 's');
                    layer.appendChild(coin);
                    setTimeout(() => coin.remove(), 3000);
                }
            }

            function lightningFlash() {
                const flash = document.createElement('div');
                flash.className = 'lightning-flash';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 200);
            }

            function megaEffects() {
                lightningFlash();
                spawnConfetti(150, ['#fff', '#ffd700', '#ff0', '#f90', '#f00', '#f0f']);
                coinRain(80);
                const rect = slotMachine.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const spark = document.createElement('div');
                        spark.className = 'spark';
                        spark.style.left = (cx + (Math.random() - 0.5) * 300) + 'px';
                        spark.style.top = (cy + (Math.random() - 0.5) * 200) + 'px';
                        spark.style.width = '8px';
                        spark.style.height = '8px';
                        spark.style.background = '#ffd700';
                        spark.style.boxShadow = '0 0 20px gold';
                        spark.style.setProperty('--sx', (Math.random() - 0.5) * 200 + 'px');
                        spark.style.setProperty('--sy', (Math.random() - 0.5) * 200 + 'px');
                        spark.style.setProperty('--spark-delay', '0s');
                        document.getElementById('particlesLayer').appendChild(spark);
                        setTimeout(() => spark.remove(), 800);
                    }, i * 200);
                }
            }

            function bigWinEffects() {
                spawnConfetti(70, ['#ffd700', '#ff0', '#f90']);
                coinRain(40);
            }

            function smallWinEffects() {
                spawnConfetti(30, ['#ffd700', '#ff0']);
                coinRain(15);
            }

            function showWinPopup(type, amount) {
                winPopupOverlay.classList.add('active');
                if (type === 'mega') {
                    popupIcon.textContent = '🌌';
                    popupTitle.textContent = 'MEGA JACKPOT!';
                } else if (type === 'big') {
                    popupIcon.textContent = '🔥';
                    popupTitle.textContent = 'BIG WIN!';
                } else {
                    popupIcon.textContent = '✨';
                    popupTitle.textContent = 'YOU WIN!';
                }
                popupAmount.textContent = '+' + amount.toLocaleString();
                const dialog = winPopupOverlay.querySelector('.popup-dialog');
                dialog.style.animation = 'none';
                dialog.offsetHeight;
                dialog.style.animation = 'popupBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            }

            function showBonusPopup(amount) {
                bonusPopupOverlay.classList.add('active');
                bonusAmount.textContent = '+' + amount.toLocaleString();
                const dialog = bonusPopupOverlay.querySelector('.popup-dialog');
                dialog.style.animation = 'none';
                dialog.offsetHeight;
                dialog.style.animation = 'popupBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            }

            function hidePopups() {
                winPopupOverlay.classList.remove('active');
                bonusPopupOverlay.classList.remove('active');
            }

            document.getElementById('popupCloseBtn').addEventListener('click', () => winPopupOverlay.classList.remove(
                'active'));
            document.getElementById('bonusCollectBtn').addEventListener('click', () => bonusPopupOverlay.classList
                .remove('active'));
            winPopupOverlay.addEventListener('click', e => { if (e.target === winPopupOverlay) winPopupOverlay
                    .classList.remove('active'); });
            bonusPopupOverlay.addEventListener('click', e => { if (e.target === bonusPopupOverlay)
                bonusPopupOverlay.classList.remove('active'); });

            spinBtn.addEventListener('click', spin);
            document.addEventListener('keydown', e => {
                if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault();
                    spin(); }
                if (e.code === 'Escape') hidePopups();
            });

            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (spinning) return;
                    document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    bet = parseInt(btn.dataset.bet);
                });
            });

            // Handle window resize to recalc SYM_HEIGHT
            window.addEventListener('resize', () => {
                const reel = document.querySelector('.reel');
                if (reel) {
                    SYM_HEIGHT = reel.clientHeight / VISIBLE_SYMBOLS;
                    document.documentElement.style.setProperty('--sym-height', SYM_HEIGHT + 'px');
                    // Update all symbol heights
                    document.querySelectorAll('.symbol').forEach(s => {
                        s.style.height = SYM_HEIGHT + 'px';
                        s.style.lineHeight = SYM_HEIGHT + 'px';
                    });
                    // Adjust reel strip positions (if not spinning)
                    if (!spinning) {
                        strips.forEach(strip => {
                            strip.style.transform = `translateY(-${SYM_HEIGHT * 2}px)`;
                        });
                    }
                }
            });

            // Initialize game
            createReels();
            resetReels();
            updateBalance();
        })();
    </script>
</body>
</html>
