<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 SUPER PLV - Jili Style Slots</title>
    <style>
        :root {
            --bg: #06061a;
            --gold: #ffd700;
            --neon-pink: #ff2d95;
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --neon-purple: #b347ea;
            --dark: #0f0f23;
            --panel: #1a1a35;
            --fire: #ff4500;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        /* ============ COSMIC BACKGROUND ============ */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(255, 45, 149, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 60%);
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.15;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(2);
                box-shadow: 0 0 8px 3px white;
            }
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: shoot var(--dur2) linear infinite;
            animation-delay: var(--delay2);
            opacity: 0;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.9), transparent);
            right: 4px;
        }
        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-25deg);
                opacity: 0;
            }
            4% {
                opacity: 1;
            }
            12% {
                transform: translate(-450px, 220px) rotate(-25deg);
                opacity: 0;
            }
            100% {
                transform: translate(-450px, 220px) rotate(-25deg);
                opacity: 0;
            }
        }

        /* ============ PARTICLE EXPLOSIONS ============ */
        .particles-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .confetti {
            position: absolute;
            animation: confettiFall var(--fall-dur) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: var(--fall-delay);
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-120px) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            15% {
                transform: translateY(5vh) rotate(120deg) scale(1.4);
                opacity: 1;
            }
            100% {
                transform: translateY(115vh) rotate(900deg) scale(0.1);
                opacity: 0;
            }
        }
        .spark {
            position: absolute;
            border-radius: 50%;
            animation: sparkBurst 0.6s cubic-bezier(0, 0.9, 0.3, 1) forwards;
            animation-delay: var(--spark-delay);
            pointer-events: none;
        }
        @keyframes sparkBurst {
            0% {
                transform: translate(0, 0) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(var(--sx), var(--sy)) scale(0);
                opacity: 0;
            }
        }
        .ring-wave {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--clr);
            animation: ringExpand 0.7s cubic-bezier(0, 0.7, 0.3, 1) forwards;
            animation-delay: var(--ring-delay);
            pointer-events: none;
        }
        @keyframes ringExpand {
            0% {
                width: 15px;
                height: 15px;
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                width: 380px;
                height: 380px;
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .coin-rain {
            position: absolute;
            font-size: 1.5em;
            animation: coinDrop var(--coin-dur) linear forwards;
            animation-delay: var(--coin-delay);
            pointer-events: none;
        }
        @keyframes coinDrop {
            0% {
                transform: translateY(-60px) rotate(0deg);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(720deg);
                opacity: 0;
            }
        }
        .lightning-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 99;
            pointer-events: none;
            animation: lightning 0.15s ease-out forwards;
        }
        @keyframes lightning {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        /* ============ WIN POPUP OVERLAY ============ */
        .win-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .win-popup-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .win-popup {
            background: linear-gradient(180deg, #1c1c45 0%, #0e0e2c 50%, #08081e 100%);
            border: 3px solid #ffd700;
            border-radius: 24px;
            padding: 25px 30px;
            text-align: center;
            box-shadow:
                0 0 80px rgba(255, 215, 0, 0.8),
                0 0 160px rgba(255, 45, 149, 0.5),
                0 30px 80px rgba(0, 0, 0, 0.9);
            animation: popupBounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 420px;
            width: 90%;
        }
        .win-popup.mega-popup {
            border-color: #fff;
            box-shadow:
                0 0 120px rgba(255, 255, 255, 0.9),
                0 0 200px rgba(255, 215, 0, 0.7),
                0 0 300px rgba(255, 100, 0, 0.5),
                0 30px 80px rgba(0, 0, 0, 0.9);
        }
        @keyframes popupBounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
            }
            70% {
                transform: scale(0.94);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .popup-icon {
            font-size: 4em;
            animation: popupIconBounce 0.6s ease-in-out infinite;
        }
        @keyframes popupIconBounce {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-18px) scale(1.25);
            }
        }
        .popup-title {
            font-size: 2em;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 8px 0;
            background: linear-gradient(180deg, #fffde0, #ffd700, #ffb300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .popup-title.mega-title {
            background: linear-gradient(90deg, #ff0, #f90, #f00, #f0f, #0ff, #ff0);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowText 0.4s linear infinite;
        }
        @keyframes rainbowText {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 300% 50%;
            }
        }
        .popup-amount {
            font-size: 3em;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.9), 0 0 80px rgba(255, 150, 0, 0.6);
            margin: 5px 0;
            animation: amountPulse 0.8s ease-in-out infinite;
        }
        @keyframes amountPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
                text-shadow: 0 0 60px rgba(255, 215, 0, 1), 0 0 100px rgba(255, 200, 0, 0.8);
            }
        }
        .popup-amount.mega-amount {
            color: #fff;
            font-size: 3.5em;
            text-shadow: 0 0 50px #fff, 0 0 100px #ff0, 0 0 150px #f90;
            animation: megaAmountPulse 0.5s ease-in-out infinite;
        }
        @keyframes megaAmountPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
                text-shadow: 0 0 80px #fff, 0 0 140px #ff0, 0 0 200px #f90;
            }
        }
        .popup-close-btn {
            background: linear-gradient(180deg, #ffd700, #ffaa00);
            border: none;
            color: #1a1a2e;
            font-weight: 900;
            font-size: 1em;
            letter-spacing: 2px;
            padding: 10px 35px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
            transition: all 0.2s;
        }
        .popup-close-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.8);
        }

        /* ============ MAIN GAME CONTAINER ============ */
        .game-wrapper {
            position: relative;
            z-index: 5;
            perspective: 900px;
        }
        .game-container {
            background: linear-gradient(180deg, #1c1c45 0%, #0e0e2c 30%, #08081e 100%);
            border: 3px solid #ffd700;
            border-radius: 28px;
            padding: 18px 26px 26px;
            box-shadow:
                0 0 70px rgba(255, 215, 0, 0.5),
                0 0 140px rgba(255, 45, 149, 0.25),
                0 0 200px rgba(0, 212, 255, 0.15),
                0 25px 80px rgba(0, 0, 0, 0.8),
                inset 0 2px 0 rgba(255, 255, 255, 0.05);
            max-width: 500px;
            width: 95%;
            text-align: center;
            animation: containerFloat 3.5s ease-in-out infinite;
            transition: all 0.2s;
            position: relative;
        }
        @keyframes containerFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        .game-container.jackpot-shake {
            animation: jackpotShake 0.4s ease-in-out !important;
        }
        @keyframes jackpotShake {
            0%,
            100% {
                transform: translateX(0) rotate(0);
            }
            15% {
                transform: translateX(-10px) rotate(-3deg);
            }
            30% {
                transform: translateX(10px) rotate(3deg);
            }
            45% {
                transform: translateX(-6px) rotate(-1.5deg);
            }
            60% {
                transform: translateX(6px) rotate(1.5deg);
            }
            75% {
                transform: translateX(-2px);
            }
            90% {
                transform: translateX(2px);
            }
        }

        /* ============ TITLE AREA ============ */
        .title-area {
            margin-bottom: 10px;
            position: relative;
        }
        .crown-icon {
            font-size: 2.2em;
            animation: crownBounce 0.8s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9));
        }
        @keyframes crownBounce {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            25% {
                transform: translateY(-18px) scale(1.25);
            }
            50% {
                transform: translateY(0) scale(0.9);
            }
            75% {
                transform: translateY(-8px) scale(1.1);
            }
        }
        .title {
            font-size: 2.6em;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(180deg,
                    #fffde0 0%, #fff3b0 10%, #ffd700 30%, #ffb300 50%,
                    #ffd700 70%, #fff3b0 90%, #fffde0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(255, 200, 0, 0.8)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.7));
            animation: titleGlow 1.8s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 30px rgba(255, 200, 0, 0.8)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.7));
            }
            50% {
                filter: drop-shadow(0 0 55px rgba(255, 200, 0, 1)) drop-shadow(0 0 80px rgba(255, 130, 0, 0.7)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.7));
            }
        }
        .subtitle {
            color: #ffd700aa;
            font-size: 0.68em;
            letter-spacing: 9px;
            text-transform: uppercase;
            margin-top: -3px;
            animation: subtitlePulse 1.8s ease-in-out infinite;
        }
        @keyframes subtitlePulse {
            0%,
            100% {
                letter-spacing: 9px;
                color: #ffd700aa;
            }
            50% {
                letter-spacing: 13px;
                color: #ffd700ee;
            }
        }

        /* ============ BALANCE ============ */
        .balance-display {
            background: linear-gradient(180deg, #1f1f48 0%, #131330 100%);
            border: 2px solid #ffd70055;
            border-radius: 40px;
            padding: 11px 26px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }
        .balance-display::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255, 215, 0, 0.08), transparent, rgba(255, 215, 0, 0.04),
                    transparent);
            animation: balanceRotate 5s linear infinite;
        }
        @keyframes balanceRotate {
            100% {
                transform: rotate(360deg);
            }
        }
        .balance-label {
            color: #bbb;
            font-size: 0.72em;
            letter-spacing: 3px;
            z-index: 1;
        }
        .balance-amount {
            font-size: 1.8em;
            font-weight: 800;
            color: #ffd700;
            letter-spacing: 2px;
            z-index: 1;
            transition: all 0.3s;
            text-shadow: 0 0 22px rgba(255, 215, 0, 0.7);
        }
        .balance-amount.pulse {
            animation: balPulse 0.45s ease-out;
        }
        @keyframes balPulse {
            0%,
            100% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.4);
                color: #fff;
                text-shadow: 0 0 50px rgba(255, 255, 255, 1);
            }
        }
        .balance-amount.mega-win {
            animation: megaWinBal 0.55s ease-out;
            color: #ff4500;
            text-shadow: 0 0 45px rgba(255, 69, 0, 1), 0 0 90px rgba(255, 165, 0, 0.9);
        }
        @keyframes megaWinBal {
            0% {
                transform: scale(1);
            }
            20% {
                transform: scale(1.7);
            }
            40% {
                transform: scale(0.85);
            }
            60% {
                transform: scale(1.35);
            }
            80% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ============ SLOT MACHINE ============ */
        .slot-machine {
            background: linear-gradient(180deg, #2c1c58 0%, #1b0b3c 50%, #100628 100%);
            border: 4px solid #5a3a8a;
            border-radius: 20px;
            padding: 16px 12px;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
            box-shadow:
                inset 0 6px 30px rgba(0, 0, 0, 0.75),
                0 6px 28px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(179, 71, 234, 0.2);
            position: relative;
            overflow: hidden;
        }
        .slot-machine::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                    transparent, rgba(255, 215, 0, 0.25), rgba(255, 255, 255, 0.5),
                    rgba(255, 215, 0, 0.25), transparent);
            z-index: 2;
            pointer-events: none;
            animation: winLineShimmer 1.5s ease-in-out infinite;
        }
        @keyframes winLineShimmer {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }
        .slot-machine.win-glow {
            animation: winGlowEffect 0.6s ease-in-out;
        }
        @keyframes winGlowEffect {
            0%,
            100% {
                box-shadow: inset 0 6px 30px rgba(0, 0, 0, 0.75), 0 6px 28px rgba(0, 0, 0, 0.6), 0 0 50px rgba(179, 71, 234, 0.2);
                border-color: #5a3a8a;
            }
            50% {
                box-shadow:
                    inset 0 6px 45px rgba(255, 215, 0, 0.7),
                    0 0 90px rgba(255, 215, 0, 1),
                    0 0 160px rgba(255, 140, 0, 0.7),
                    0 0 220px rgba(255, 80, 0, 0.5);
                border-color: #ffd700;
            }
        }
        .slot-machine.mega-glow {
            animation: megaGlowEffect 0.4s ease-in-out 4;
        }
        @keyframes megaGlowEffect {
            0%,
            100% {
                box-shadow: inset 0 6px 30px rgba(0, 0, 0, 0.75), 0 6px 28px rgba(0, 0, 0, 0.6), 0 0 50px rgba(179, 71, 234, 0.2);
                border-color: #5a3a8a;
            }
            50% {
                box-shadow:
                    inset 0 6px 55px rgba(255, 255, 255, 0.9),
                    0 0 120px rgba(255, 255, 255, 1),
                    0 0 220px rgba(255, 215, 0, 1),
                    0 0 320px rgba(255, 80, 0, 0.9);
                border-color: #fff;
            }
        }

        .reel {
            width: 108px;
            height: 260px;
            background: #09091e;
            border: 3px solid #3a2a62;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 28px rgba(0, 0, 0, 0.9);
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        .reel-strip.spinning {
            transition: none;
            animation: blurSpin 0.08s linear infinite;
        }
        @keyframes blurSpin {
            0% {
                filter: blur(0px);
            }
            50% {
                filter: blur(3px);
            }
            100% {
                filter: blur(0px);
            }
        }
        .reel-strip.stopping {
            transition: transform 0.7s cubic-bezier(0.08, 0.82, 0.17, 1);
            filter: blur(0px) !important;
            animation: none !important;
        }
        .symbol {
            width: 108px;
            height: 86.67px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.3em;
            flex-shrink: 0;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.25));
            transition: filter 0.2s;
        }
        .symbol.win-symbol {
            animation: symbolPop 0.45s ease-out;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 1)) drop-shadow(0 0 60px rgba(255, 180, 0, 0.9)) !important;
        }
        @keyframes symbolPop {
            0% {
                transform: scale(1);
            }
            35% {
                transform: scale(1.55);
            }
            100% {
                transform: scale(1);
            }
        }
        .reel-strip.reel-stop-bounce {
            animation: reelBounce 0.3s ease-out !important;
        }
        @keyframes reelBounce {
            0% {
                transform: translateY(var(--bounce-start));
            }
            40% {
                transform: translateY(var(--bounce-overshoot));
            }
            70% {
                transform: translateY(var(--bounce-back));
            }
            100% {
                transform: translateY(var(--bounce-final));
            }
        }

        /* ============ BET CONTROLS ============ */
        .bet-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .bet-label {
            color: #999;
            font-size: 0.68em;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .bet-buttons {
            display: flex;
            gap: 6px;
        }
        .bet-btn {
            background: var(--panel);
            border: 2px solid #ffffff14;
            color: #bbb;
            padding: 9px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.82em;
            transition: all 0.22s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .bet-btn:hover {
            border-color: #ffd70077;
            color: #ffd700;
            box-shadow: 0 0 22px rgba(255, 215, 0, 0.25);
        }
        .bet-btn.active {
            background: #ffd70018;
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.45), 0 0 55px rgba(255, 140, 0, 0.25);
            animation: activeBetPulse 1.4s ease-in-out infinite;
        }
        @keyframes activeBetPulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.45);
            }
            50% {
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 140, 0, 0.5);
            }
        }

        /* ============ SPIN BUTTON ============ */
        .spin-btn {
            background: linear-gradient(180deg, #ff5858 0%, #d40404 50%, #a80000 100%);
            border: none;
            color: white;
            font-size: 1.4em;
            font-weight: 900;
            letter-spacing: 5px;
            padding: 17px 55px;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow:
                0 8px 32px rgba(255, 0, 0, 0.55),
                0 0 0 4px #ff00003d,
                0 0 70px rgba(255, 0, 0, 0.3);
            transition: all 0.18s;
            position: relative;
            overflow: hidden;
            animation: spinBtnGlow 1.8s ease-in-out infinite;
        }
        @keyframes spinBtnGlow {
            0%,
            100% {

    <script>
        (function() {
            // ============ AUDIO ENGINE (Web Audio API - generated sounds) ============
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new AudioCtx();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playTone(freq, duration, type = 'sine', volume = 0.15, rampDown = true) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(volume, t);
                    if (rampDown) {
                        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    }
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {
                    // ignore audio errors
                }
            }

            function playNoise(duration, volume = 0.08) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const bufferSize = audioCtx.sampleRate * duration;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * volume;
                    }
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(volume, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    source.connect(gain);
                    gain.connect(audioCtx.destination);
                    source.start(t);
                } catch (e) { /* ignore */ }
            }

            // Sound: reel spin (tick-tick-tick)
            function soundReelSpin() {
                playNoise(0.08, 0.04);
            }

            // Sound: reel stop click
            function soundReelStop() {
                playTone(200, 0.1, 'square', 0.1);
                playTone(300, 0.08, 'square', 0.08);
            }

            // Sound: small win
            function soundSmallWin() {
                playTone(523, 0.12, 'sine', 0.18);
                setTimeout(() => playTone(659, 0.12, 'sine', 0.18), 120);
                setTimeout(() => playTone(784, 0.2, 'sine', 0.2), 240);
            }

            // Sound: big win
            function soundBigWin() {
                const notes = [523, 659, 784, 1047, 784, 1047, 1319];
                notes.forEach((freq, i) => {
                    setTimeout(() => playTone(freq, 0.2, 'sine', 0.22), i * 100);
                });
            }

            // Sound: mega jackpot
            function soundMegaJackpot() {
                const notes = [523, 659, 784, 1047, 1319, 1568, 2093, 2637];
                notes.forEach((freq, i) => {
                    setTimeout(() => playTone(freq, 0.35, 'sine', 0.28), i * 80);
                });
                // Add a sweep
                setTimeout(() => {
                    if (!audioCtx) return;
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, t);
                    osc.frequency.exponentialRampToValueAtTime(2000, t + 0.6);
                    gain.gain.setValueAtTime(0.15, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 0.6);
                }, 600);
            }

            // Sound: spin button click
            function soundSpinClick() {
                playTone(150, 0.06, 'square', 0.12);
                playTone(100, 0.08, 'square', 0.1);
            }

            // Sound: popup appear
            function soundPopupAppear() {
                playTone(440, 0.15, 'sine', 0.2);
                setTimeout(() => playTone(554, 0.15, 'sine', 0.2), 100);
                setTimeout(() => playTone(659, 0.25, 'sine', 0.25), 200);
            }

            // Sound: popup close / collect
            function soundCollect() {
                playTone(784, 0.1, 'sine', 0.2);
                setTimeout(() => playTone(1047, 0.15, 'sine', 0.25), 80);
            }

            // ============ GAME STATE ============
            const SYMBOLS = ['🍒', '🍋', '🍊', '💎', '👑', '⭐', '7️⃣'];
            const SYMBOL_WEIGHTS = [30, 25, 20, 12, 8, 4, 1];
            const SYMBOL_PAYOUTS = {
                '🍒': 5,
                '🍋': 8,
                '🍊': 10,
                '💎': 15,
                '👑': 50,
                '⭐': 100,
                '7️⃣': 200
            };

            let balance = 1000;
            let currentBet = 25;
            let isSpinning = false;
            let reelResults = ['🍒', '🍒', '🍒'];
            let stopCount = 0;
            let totalSpins = 0;
            let totalWins = 0;
            let reelAnimations = [null, null, null];
            let spinSoundInterval = null;

            // ============ DOM ELEMENTS ============
            const balanceDisplay = document.getElementById('balanceDisplay');
            const winMessage = document.getElementById('winMessage');
            const spinButton = document.getElementById('spinButton');
            const slotMachine = document.getElementById('slotMachine');
            const gameContainer = document.getElementById('gameContainer');
            const particlesLayer = document.getElementById('particlesLayer');
            const paylineInfo = document.getElementById('paylineInfo');
            const winPopupOverlay = document.getElementById('winPopupOverlay');
            const winPopup = document.getElementById('winPopup');
            const popupIcon = document.getElementById('popupIcon');
            const popupTitle = document.getElementById('popupTitle');
            const popupAmount = document.getElementById('popupAmount');
            const popupCloseBtn = document.getElementById('popupCloseBtn');
            const strips = [
                document.getElementById('strip1'),
                document.getElementById('strip2'),
                document.getElementById('strip3')
            ];
            const betButtons = document.querySelectorAll('.bet-btn');

            // ============ WIN POPUP LOGIC ============
            function showWinPopup(type, symbol, amount) {
                initAudio();
                winPopupOverlay.classList.add('active');
                winPopup.classList.remove('mega-popup');
                popupTitle.classList.remove('mega-title');
                popupAmount.classList.remove('mega-amount');

                if (type === 'mega') {
                    popupIcon.textContent = '🌌';
                    popupTitle.textContent = 'MEGA JACKPOT!';
                    popupTitle.classList.add('mega-title');
                    popupAmount.textContent = '+' + amount.toLocaleString();
                    popupAmount.classList.add('mega-amount');
                    winPopup.classList.add('mega-popup');
                    soundPopupAppear();
                    setTimeout(() => soundMegaJackpot(), 200);
                } else if (type === 'big') {
                    popupIcon.textContent = '🔥';
                    popupTitle.textContent = 'BIG WIN!';
                    popupAmount.textContent = '+' + amount.toLocaleString();
                    soundPopupAppear();
                    setTimeout(() => soundBigWin(), 200);
                } else if (type === 'win') {
                    popupIcon.textContent = '✨';
                    popupTitle.textContent = 'YOU WIN!';
                    popupAmount.textContent = '+' + amount.toLocaleString();
                    soundPopupAppear();
                    setTimeout(() => soundSmallWin(), 200);
                } else if (type === 'two') {
                    popupIcon.textContent = '👌';
                    popupTitle.textContent = 'TWO OF A KIND';
                    popupAmount.textContent = '+' + amount.toLocaleString();
                    soundPopupAppear();
                    setTimeout(() => soundSmallWin(), 200);
                }

                // Re-trigger popup bounce animation
                winPopup.style.animation = 'none';
                winPopup.offsetHeight;
                winPopup.style.animation = 'popupBounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            }

            function hideWinPopup() {
                soundCollect();
                winPopupOverlay.classList.remove('active');
            }

            popupCloseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                hideWinPopup();
            });
            winPopupOverlay.addEventListener('click', (e) => {
                if (e.target === winPopupOverlay) {
                    hideWinPopup();
                }
            });

            // ============ BUILD COSMIC BACKGROUND ============
            function buildCosmicBg() {
                const bg = document.getElementById('cosmicBg');
                for (let i = 0; i < 90; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.width = (1 + Math.random() * 3) + 'px';
                    star.style.height = star.style.width;
                    star.style.setProperty('--dur', (1.2 + Math.random() * 4) + 's');
                    star.style.setProperty('--delay', Math.random() * 5 + 's');
                    bg.appendChild(star);
                }
                for (let i = 0; i < 6; i++) {
                    const ss = document.createElement('div');
                    ss.className = 'shooting-star';
                    ss.style.left = (15 + Math.random() * 65) + '%';
                    ss.style.top = (5 + Math.random() * 35) + '%';
                    ss.style.setProperty('--dur2', (2.5 + Math.random() * 5) + 's');
                    ss.style.setProperty('--delay2', Math.random() * 7 + 's');
                    bg.appendChild(ss);
                }
            }

            // ============ BUILD REEL STRIPS ============
            const REEL_LENGTH = 40;
            const SYMBOL_HEIGHT = 86.67;
            const VISIBLE_SYMBOLS = 3;

            function getWeightedSymbol() {
                const totalWeight = SYMBOL_WEIGHTS.reduce((a, b) => a + b, 0);
                let rand = Math.random() * totalWeight;
                for (let i = 0; i < SYMBOLS.length; i++) {
                    rand -= SYMBOL_WEIGHTS[i];
                    if (rand <= 0) return SYMBOLS[i];
                }
                return SYMBOLS[SYMBOLS.length - 1];
            }

            function buildReelStrip(stripElement, forceResult = null, resultIndex = 0) {
                stripElement.innerHTML = '';
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < REEL_LENGTH; i++) {
                    const symbolDiv = document.createElement('div');
                    symbolDiv.className = 'symbol';
                    let symbol;
                    if (forceResult && i === resultIndex) {
                        symbol = forceResult;
                    } else {
                        symbol = getWeightedSymbol();
                    }
                    symbolDiv.textContent = symbol;
                    fragment.appendChild(symbolDiv);
                }
                stripElement.appendChild(fragment);
            }

            function setReelToSymbol(stripElement, symbol) {
                const allSymbols = stripElement.querySelectorAll('.symbol');
                if (allSymbols.length > 1) {
                    allSymbols[1].textContent = symbol;
                }
            }

            function initializeReels() {
                for (let i = 0; i < 3; i++) {
                    buildReelStrip(strips[i]);
                    setReelToSymbol(strips[i], reelResults[i]);
                }
                strips.forEach(strip => {
                    strip.style.transform = `translateY(-${SYMBOL_HEIGHT}px)`;
                    strip.style.transition = 'none';
                    strip.classList.remove('spinning', 'stopping', 'reel-stop-bounce');
                });
            }

                    setTimeout(() => {
                        if (winMessage.textContent === text) {
                            winMessage.textContent = '';
                            winMessage.className = 'win-message';
                        }
                    }, timeout);
                }
            }

            function highlightPayline(symbol) {
                const spans = paylineInfo.querySelectorAll('span');
                spans.forEach(s => s.classList.remove('highlight-pay'));
                const match = paylineInfo.querySelector(`span[data-sym="${symbol}"]`);
                if (match) {
                    match.classList.add('highlight-pay');
                    setTimeout(() => match.classList.remove('highlight-pay'), 2000);
                }
            }

            // ============ EFFECTS ENGINE ============
            function spawnConfetti(count = 50, colors = ['#ffd700', '#ff2d95', '#00d4ff', '#39ff14', '#ff4500',
                '#b347ea', '#fff'
            ]) {

                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = -(Math.random() * 50) + 'px';
                    confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.fontSize = (12 + Math.random() * 28) + 'px';
                    confetti.style.setProperty('--fall-dur', (1.8 + Math.random() * 3) + 's');
                    confetti.style.setProperty('--fall-delay', Math.random() * 0.6 + 's');
                    particlesLayer.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }
            }

            function coinRain(count = 35) {
                for (let i = 0; i < count; i++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin-rain';
                    coin.textContent = '🪙';
                    coin.style.left = Math.random() * 100 + '%';
                    coin.style.top = -(Math.random() * 80) + 'px';
                    coin.style.fontSize = (1.2 + Math.random() * 2) + 'em';
                    coin.style.setProperty('--coin-dur', (1.5 + Math.random() * 2.5) + 's');
                    coin.style.setProperty('--coin-delay', Math.random() * 1 + 's');
                    particlesLayer.appendChild(coin);
                    setTimeout(() => coin.remove(), 4000);
                }
            }

            function spawnSparks(x, y, count = 30, color = '#ffd700') {
                for (let i = 0; i < count; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    spark.style.left = x + 'px';
                    spark.style.top = y + 'px';
                    spark.style.width = (3 + Math.random() * 8) + 'px';
                    spark.style.height = spark.style.width;
                    spark.style.background = color;
                    spark.style.boxShadow = `0 0 ${8 + Math.random() * 16}px ${color}`;
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 50 + Math.random() * 140;

                    spark.style.setProperty('--sy', Math.sin(angle) * dist + 'px');

            function spawnRings(x, y, count = 5) {
                const colors = ['#ffd700', '#ff2d95', '#00d4ff', '#39ff14', '#ff4500', '#b347ea', '#fff'];
                for (let i = 0; i < count; i++) {
                    const ring = document.createElement('div');
                    ring.className = 'ring-wave';
                    ring.style.left = x + 'px';
                    ring.style.top = y + 'px';

                    particlesLayer.appendChild(ring);

                const flash = document.createElement('div');
                flash.className = 'lightning-flash';

                const rect = slotMachine.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                lightningFlash();
                spawnConfetti(100, ['#fff', '#ffd700', '#ff0', '#f90', '#f00', '#f0f', '#0ff', '#0f0', '#fff']);
                spawnSparks(cx, cy, 60, '#fff');
                spawnSparks(cx - 50, cy, 35, '#ffd700');
                spawnSparks(cx + 50, cy, 35, '#ff4500');
                spawnRings(cx, cy, 10);
                coinRain(50);
                setTimeout(() => {
                    spawnConfetti(50, ['#ffd700', '#ff0', '#fff']);
                    spawnSparks(cx, cy, 25, '#ff0');
                    spawnRings(cx, cy, 5);
                    coinRain(25);
                }, 350);
                setTimeout(() => {
                    lightningFlash();
                }, 500);
            }

            function winExplosion() {
                const rect = slotMachine.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnConfetti(45);
                spawnSparks(cx, cy, 25, '#ffd700');
                spawnRings(cx, cy, 4);
                coinRain(20);
            }

            function smallWinEffect() {
                const rect = slotMachine.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnConfetti(18, ['#ffd700', '#ff0']);
                spawnSparks(cx, cy, 12, '#ffd700');
                spawnRings(cx, cy, 2);
                coinRain(8);
            }

            function ambientSparkle() {
                const rect = gameContainer.getBoundingClientRect();
                const x = rect.left + Math.random() * rect.width;
                const y = rect.top + Math.random() * rect.height;
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                spark.style.width = '3px';
                spark.style.height = '3px';
                spark.style.background = '#ffd700';
                spark.style.boxShadow = '0 0 7px #ffd700';
                spark.style.setProperty('--sx', (Math.random() - 0.5) * 25 + 'px');
                spark.style.setProperty('--sy', (Math.random() - 0.5) * 25 + 'px');
                spark.style.setProperty('--spark-delay', '0s');
                particlesLayer.appendChild(spark);
                setTimeout(() => spark.remove(), 600);
            }

            // ============ SPIN LOGIC ============
            function spinAllReels() {
                if (isSpinning) return;
                if (balance < currentBet) {
                    setWinMessage('💸 INSUFFICIENT BALANCE!', 'win');
                    shakeElement(spinButton);
                    playTone(100, 0.2, 'square', 0.12);
                    return;
                }

                initAudio();
                soundSpinClick();
                totalSpins++;
                balance -= currentBet;
                updateBalanceDisplay();
                setWinMessage('🎰 SPINNING...');
                isSpinning = true;
                stopCount = 0;
                spinButton.disabled = true;
                spinButton.classList.add('spinning-active');
                slotMachine.classList.remove('win-glow', 'mega-glow');
                gameContainer.classList.remove('jackpot-shake');
                hideWinPopup();

                reelAnimations.forEach(id => { if (id) cancelAnimationFrame(id); });
                reelAnimations = [null, null, null];

                reelResults = [
                    getWeightedSymbol(),
                    getWeightedSymbol(),
                    getWeightedSymbol()
                ];

                const spinDurations = [
                    700 + Math.random() * 250,
                    1000 + Math.random() * 250,
                    1300 + Math.random() * 250
                ];

                // Spin sound loop
                if (spinSoundInterval) clearInterval(spinSoundInterval);
                spinSoundInterval = setInterval(() => {
                    soundReelSpin();
                }, 80);

                strips.forEach((strip, index) => {
                    buildReelStrip(strip, reelResults[index], 1);
                    strip.style.transition = 'none';
                    strip.style.transform = `translateY(-${SYMBOL_HEIGHT}px)`;
                    strip.classList.remove('spinning', 'stopping', 'reel-stop-bounce');
                    strip.offsetHeight;

                    const startTime = Date.now();
                    const spinSpeed = 22;

                    function animateSpin() {
                        const elapsed = Date.now() - startTime;
                        if (elapsed < spinDurations[index]) {
                            const currentY = parseFloat(strip.style.transform.replace('translateY(', '')
                                .replace('px)', '')) || -SYMBOL_HEIGHT;
                            let newY = currentY - spinSpeed;
                            const maxScroll = (REEL_LENGTH - VISIBLE_SYMBOLS) * SYMBOL_HEIGHT;
                            if (newY < -maxScroll) newY = -SYMBOL_HEIGHT;
                            strip.style.transform = `translateY(${newY}px)`;
                            strip.classList.add('spinning');
                            strip.classList.remove('stopping', 'reel-stop-bounce');
                            reelAnimations[index] = requestAnimationFrame(animateSpin);
                        } else {
                            strip.classList.remove('spinning');
                            strip.classList.add('stopping');
                            const targetY = -SYMBOL_HEIGHT;
                            strip.style.transform = `translateY(${targetY}px)`;

                            soundReelStop();

                            setTimeout(() => {
                                const currentStripY = parseFloat(strip.style.transform.replace(
                                    'translateY(', '').replace('px)', '')) || -SYMBOL_HEIGHT;
                                strip.classList.add('reel-stop-bounce');
                                strip.style.setProperty('--bounce-start', currentStripY + 'px');
                                strip.style.setProperty('--bounce-overshoot', (currentStripY + 12) +
                                    'px');
                                strip.style.setProperty('--bounce-back', (currentStripY - 5) + 'px');
                                strip.style.setProperty('--bounce-final', targetY + 'px');
                                strip.style.transform = `translateY(${targetY}px)`;
                                setTimeout(() => {
                                    strip.classList.remove('reel-stop-bounce');
                                    strip.style.transition = 'none';
                                    strip.style.transform =
                                        `translateY(${targetY}px)`;
                                }, 320);
                            }, 50);

                            const reelRect = strip.parentElement.getBoundingClientRect();
                            const cx = reelRect.left + reelRect.width / 2;
                            const cy = reelRect.top + reelRect.height / 2;
                            spawnSparks(cx, cy, 8, '#fff');

                            stopCount++;
                            reelAnimations[index] = null;
                            if (stopCount === 3) {
                                if (spinSoundInterval) clearInterval(spinSoundInterval);
                                setTimeout(checkWin, 400);
                            }
                        }
                    }
                    reelAnimations[index] = requestAnimationFrame(animateSpin);
                });
            }

            function checkWin() {
                isSpinning = false;
                spinButton.disabled = false;
                spinButton.classList.remove('spinning-active');
                if (spinSoundInterval) clearInterval(spinSoundInterval);

                const [r1, r2, r3] = reelResults;

                if (r1 === r2 && r2 === r3) {
                    const multiplier = SYMBOL_PAYOUTS[r1] || 5;
                    const winnings = currentBet * multiplier;
                    balance += winnings;
                    totalWins++;
                    updateBalanceDisplay();
                    highlightPayline(r1);

                    strips.forEach(strip => {
                        const syms = strip.querySelectorAll('.symbol');
                        if (syms[1]) syms[1].classList.add('win-symbol');
                        setTimeout(() => {
                            if (syms[1]) syms[1].classList.remove('win-symbol');
                        }, 550);
                    });

                    if (multiplier >= 200) {
                        slotMachine.classList.add('mega-glow');
                        gameContainer.classList.add('jackpot-shake');
                        setWinMessage('🌌 MEGA JACKPOT! 🌌', 'big-win');
                        megaWinBalAnim();
                        megaExplosion();
                        soundMegaJackpot();
                        setTimeout(() => {
                            showWinPopup('mega', r1, winnings);
                        }, 600);
                        setTimeout(() => megaExplosion(), 450);
                        setTimeout(() => gameContainer.classList.remove('jackpot-shake'), 900);
                        setTimeout(() => slotMachine.classList.remove('mega-glow'), 1800);
                    } else if (multiplier >= 100) {
                        slotMachine.classList.add('win-glow');
                        gameContainer.classList.add('jackpot-shake');
                        setWinMessage(`🎉 JACKPOT! +${winnings.toLocaleString()} (${multiplier}x) 🎉`,
                            'big-win');
                        megaWinBalAnim();
                        winExplosion();
                        soundBigWin();
                        setTimeout(() => {
                            showWinPopup('big', r1, winnings);
                        }, 500);
                        setTimeout(() => gameContainer.classList.remove('jackpot-shake'), 700);
                        setTimeout(() => slotMachine.classList.remove('win-glow'), 800);
                    } else if (multiplier >= 50) {
                        slotMachine.classList.add('win-glow');
                        setWinMessage(`🔥 BIG WIN! +${winnings.toLocaleString()} (${multiplier}x)`,
                            'big-win');
                        winExplosion();
                        soundBigWin();
                        setTimeout(() => {
                            showWinPopup('big', r1, winnings);
                        }, 500);
                        setTimeout(() => slotMachine.classList.remove('win-glow'), 700);
                    } else {
                        slotMachine.classList.add('win-glow');
                        setWinMessage(`✨ WIN! +${winnings.toLocaleString()} (${multiplier}x)`, 'win');
                        smallWinEffect();
                        soundSmallWin();
                        setTimeout(() => {
                            showWinPopup('win', r1, winnings);
                        }, 400);
                        setTimeout(() => slotMachine.classList.remove('win-glow'), 600);
                    }
                } else if (r1 === r2 || r2 === r3 || r1 === r3) {
                    const winnings = Math.floor(currentBet * 0.5);
                    balance += winnings;
                    updateBalanceDisplay();
                    setWinMessage(`👌 Two of a kind! +${winnings}`, 'win');
                    smallWinEffect();
                    soundSmallWin();
                    setTimeout(() => {
                        showWinPopup('two', null, winnings);
                    }, 400);
                } else {
                    setWinMessage('😞 No luck... Spin again!');
                    const rect = slotMachine.getBoundingClientRect();
                    spawnSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, 3, '#ff000033');
                    playTone(80, 0.3, 'sine', 0.06);
                }
            }

            function shakeElement(el) {
                el.style.animation = 'none';
                el.offsetHeight;
                el.style.animation = 'bigWinShake 0.2s ease-in-out 3';
                setTimeout(() => el.style.animation = '', 600);
            }

            // ============ EVENT LISTENERS ============
            spinButton.addEventListener('click', spinAllReels);
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'Enter') {
                    e.preventDefault();
                    spinAllReels();
                }
                if (e.code === 'Escape') {
                    hideWinPopup();
                }
            });

            betButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (isSpinning) return;
                    initAudio();
                    playTone(300, 0.05, 'sine', 0.08);
                    betButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentBet = parseInt(btn.dataset.bet);
                });
            });

            // ============ INITIALIZE ============
            function init() {
                buildCosmicBg();
                initializeReels();
                updateBalanceDisplay();
                setWinMessage('👑 Press SPIN or Spacebar! 👑');

                setInterval(() => {
                    if (!isSpinning) ambientSparkle();
                }, 1200);
                setInterval(() => {
                    if (!isSpinning) {
                        const c = document.createElement('div');
                        c.className = 'confetti';
                        c.textContent = '✦';
                        c.style.left = Math.random() * 100 + '%';
                        c.style.top = '-20px';
                        c.style.color = '#ffd70033';
                        c.style.fontSize = '7px';
                        c.style.setProperty('--fall-dur', (6 + Math.random() * 6) + 's');
                        c.style.setProperty('--fall-delay', '0s');
                        particlesLayer.appendChild(c);
                        setTimeout(() => c.remove(), 9000);
                    }
                }, 2500);
            }

            init();

            console.log('👑🎰 SUPER PLV - JILI STYLE SLOTS READY!');
            console.log('⚡ Ultra-fast spins + smooth deceleration!');
            console.log('💰 Win popups with sounds!');
            console.log('🔊 Audio: spin, stop, win, jackpot, collect!');
            console.log('🌌 7️⃣7️⃣7️⃣ = MEGA JACKPOT POPUP!!!');
        })();
    </script>
</body>
</html>
